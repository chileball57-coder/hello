<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Clima</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.contenedor {
    max-width: 1200px;
    margin: 0 auto;
}

header {
    text-align: center;
    color: white;
    margin-bottom: 30px;
}

header h1 {
    font-size: 40px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.busqueda {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.busqueda input {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    width: 300px;
    font-size: 16px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.busqueda button {
    padding: 12px 30px;
    background: white;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    color: #667eea;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
}

.busqueda button:hover {
    background: #f0f0f0;
    transform: translateY(-2px);
}

.clima-actual {
    background: white;
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    text-align: center;
}

.ubicacion {
    font-size: 28px;
    color: #333;
    margin-bottom: 10px;
    font-weight: bold;
}

.temperatura-actual {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin: 20px 0;
}

.icono-clima {
    font-size: 100px;
}

.info-temp {
    text-align: left;
}

.temp-grande {
    font-size: 60px;
    color: #667eea;
    font-weight: bold;
}

.clima-descripcion {
    font-size: 20px;
    color: #666;
    text-transform: capitalize;
    margin-bottom: 20px;
}

.detalles-clima {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.detalle {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    border-left: 4px solid #667eea;
}

.detalle-titulo {
    color: #999;
    font-size: 12px;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.detalle-valor {
    font-size: 24px;
    color: #333;
    font-weight: bold;
}

.pronostico {
    margin-top: 30px;
}

.pronostico h2 {
    color: white;
    margin-bottom: 20px;
    font-size: 24px;
}

.dias {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
}

.dia {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
}

.dia:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.dia-fecha {
    font-size: 14px;
    color: #999;
    margin-bottom: 10px;
}

.dia-icono {
    font-size: 40px;
    margin: 10px 0;
}

.dia-temp {
    font-size: 16px;
    color: #333;
    margin-bottom: 5px;
}

.dia-temp-min {
    font-size: 12px;
    color: #999;
}

.dia-descripcion {
    font-size: 12px;
    color: #666;
    margin-top: 10px;
    text-transform: capitalize;
}

.error {
    background: #ff6b6b;
    color: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    margin-bottom: 20px;
}

.loading {
    text-align: center;
    color: white;
    font-size: 18px;
    padding: 40px;
}

.spinner {
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.ciudades-rapidas {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.ciudad-btn {
    padding: 8px 15px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: 2px solid white;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14px;
}

.ciudad-btn:hover {
    background: white;
    color: #667eea;
}

footer {
    text-align: center;
    color: white;
    margin-top: 40px;
    font-size: 12px;
}

@media (max-width: 768px) {
    header h1 {
        font-size: 28px;
    }

    .busqueda input {
        width: 100%;
    }

    .temperatura-actual {
        flex-direction: column;
        gap: 20px;
    }

    .temp-grande {
        font-size: 48px;
    }

    .dias {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    }
}
</style>

</head>

<body>

<div class="contenedor">
    <header>
        <h1>🌤️ Panel de Clima</h1>
        <p>Obtén el clima en tiempo real de cualquier lugar</p>
    </header>

    <div class="busqueda">
        <input type="text" id="ciudadInput" placeholder="Buscar ciudad..." />
        <button onclick="buscarClima()">🔍 Buscar</button>
    </div>

    <div class="ciudades-rapidas">
        <button class="ciudad-btn" onclick="buscarPorCiudad('Madrid')">Madrid</button>
        <button class="ciudad-btn" onclick="buscarPorCiudad('Barcelona')">Barcelona</button>
        <button class="ciudad-btn" onclick="buscarPorCiudad('New York')">New York</button>
        <button class="ciudad-btn" onclick="buscarPorCiudad('Tokyo')">Tokyo</button>
        <button class="ciudad-btn" onclick="buscarPorCiudad('London')">London</button>
    </div>

    <div id="resultado"></div>

    <footer>
        <p>Powered by Open-Meteo API | Datos actualizados en tiempo real</p>
    </footer>
</div>

<script>
const API_GEO = "https://geocoding-api.open-meteo.com/v1/search";
const API_CLIMA = "https://api.open-meteo.com/v1/forecast";

// Mapeo de códigos climáticos a emojis
const iconosClima = {
    0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️",
    51: "🌧️", 53: "🌧️", 55: "🌧️", 61: "🌧️", 63: "🌧️", 65: "⛈️",
    71: "🌨️", 73: "🌨️", 75: "🌨️", 77: "🌨️", 80: "🌧️", 81: "⛈️",
    82: "⛈️", 85: "🌨️", 86: "🌨️", 95: "⛈️", 96: "⛈️", 99: "⛈️"
};

// Obtener ubicación actual
function obtenerUbicacionActual() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            posicion => {
                const lat = posicion.coords.latitude;
                const lon = posicion.coords.longitude;
                obtenerClimaDirecto(lat, lon);
            },
            error => {
                console.log("Ubicación no disponible, usando Madrid por defecto");
                buscarPorCiudad("Madrid");
            }
        );
    } else {
        buscarPorCiudad("Madrid");
    }
}

// Buscar clima por coordenadas
async function obtenerClimaDirecto(lat, lon) {
    mostrarCargando();
    
    try {
        const response = await fetch(
            `${API_CLIMA}?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,relative_humidity_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`
        );
        const data = await response.json();
        
        // Obtener nombre de la ciudad
        const geoResponse = await fetch(
            `${API_GEO}?latitude=${lat}&longitude=${lon}&count=1&language=es`
        );
        const geoData = await geoResponse.json();
        
        const ciudad = geoData.results ? geoData.results[0].name : "Ubicación";
        const pais = geoData.results ? geoData.results[0].country : "";
        
        mostrarClima(data, ciudad, pais);
    } catch (error) {
        mostrarError("Error al obtener el clima: " + error.message);
    }
}

// Buscar ciudad
async function buscarClima() {
    const ciudad = document.getElementById("ciudadInput").value.trim();
    if (!ciudad) {
        mostrarError("Por favor, ingresa una ciudad");
        return;
    }
    buscarPorCiudad(ciudad);
}

// Buscar por nombre de ciudad
async function buscarPorCiudad(ciudad) {
    mostrarCargando();
    
    try {
        // Obtener coordenadas
        const geoResponse = await fetch(
            `${API_GEO}?name=${ciudad}&count=1&language=es`
        );
        const geoData = await geoResponse.json();
        
        if (!geoData.results || geoData.results.length === 0) {
            mostrarError("Ciudad no encontrada");
            return;
        }
        
        const resultado = geoData.results[0];
        const lat = resultado.latitude;
        const lon = resultado.longitude;
        
        // Obtener clima
        const climaResponse = await fetch(
            `${API_CLIMA}?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`
        );
        const climaData = await climaResponse.json();
        
        mostrarClima(climaData, resultado.name, resultado.country);
    } catch (error) {
        mostrarError("Error al buscar: " + error.message);
    }
}

// Mostrar clima
function mostrarClima(data, ciudad, pais) {
    const current = data.current;
    const daily = data.daily;
    
    const codigoClima = current.weather_code;
    const icono = iconosClima[codigoClima] || "🌡️";
    
    const temperatura = Math.round(current.temperature_2m);
    const humedad = current.relative_humidity_2m;
    const viento = Math.round(current.wind_speed_10m);
    
    let descripcion = obtenerDescripcionClima(codigoClima);
    
    // Generar pronóstico de 7 días
    let pronosticoHTML = "";
    for (let i = 0; i < 7; i++) {
        const fecha = new Date(daily.time[i]);
        const fechaFormato = fecha.toLocaleDateString("es-ES", { weekday: "short", month: "short", day: "numeric" });
        const iconoDia = iconosClima[daily.weather_code[i]] || "🌡️";
        const tempMax = Math.round(daily.temperature_2m_max[i]);
        const tempMin = Math.round(daily.temperature_2m_min[i]);
        const descrip = obtenerDescripcionClima(daily.weather_code[i]);
        
        pronosticoHTML += `
            <div class="dia">
                <div class="dia-fecha">${fechaFormato}</div>
                <div class="dia-icono">${iconoDia}</div>
                <div class="dia-temp">${tempMax}°</div>
                <div class="dia-temp-min">${tempMin}°</div>
                <div class="dia-descripcion">${descrip}</div>
            </div>
        `;
    }
    
    const html = `
        <div class="clima-actual">
            <div class="ubicacion">📍 ${ciudad}, ${pais}</div>
            
            <div class="temperatura-actual">
                <div class="icono-clima">${icono}</div>
                <div class="info-temp">
                    <div class="temp-grande">${temperatura}°C</div>
                    <div class="clima-descripcion">${descripcion}</div>
                </div>
            </div>
            
            <div class="detalles-clima">
                <div class="detalle">
                    <div class="detalle-titulo">Sensación térmica</div>
                    <div class="detalle-valor">${temperatura}°C</div>
                </div>
                <div class="detalle">
                    <div class="detalle-titulo">Humedad</div>
                    <div class="detalle-valor">${humedad}%</div>
                </div>
                <div class="detalle">
                    <div class="detalle-titulo">Velocidad del viento</div>
                    <div class="detalle-valor">${viento} km/h</div>
                </div>
            </div>
        </div>
        
        <div class="pronostico">
            <h2>📅 Pronóstico 7 días</h2>
            <div class="dias">${pronosticoHTML}</div>
        </div>
    `;
    
    document.getElementById("resultado").innerHTML = html;
    document.getElementById("ciudadInput").value = ciudad;
}

// Obtener descripción del clima
function obtenerDescripcionClima(codigo) {
    const descripciones = {
        0: "Cielo despejado",
        1: "Mayormente despejado",
        2: "Parcialmente nublado",
        3: "Nublado",
        45: "Neblina",
        48: "Neblina",
        51: "Llovizna ligera",
        53: "Llovizna moderada",
        55: "Llovizna densa",
        61: "Lluvia ligera",
        63: "Lluvia moderada",
        65: "Lluvia fuerte",
        71: "Nieve ligera",
        73: "Nieve moderada",
        75: "Nieve fuerte",
        77: "Granos de nieve",
        80: "Lluvia dispersa",
        81: "Lluvia fuerte dispersa",
        82: "Lluvia muy fuerte",
        85: "Nieve dispersa",
        86: "Nieve fuerte dispersa",
        95: "Tormenta",
        96: "Tormenta con granizo",
        99: "Tormenta fuerte con granizo"
    };
    return descripciones[codigo] || "Clima desconocido";
}

// Mostrar cargando
function mostrarCargando() {
    document.getElementById("resultado").innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            Obteniendo datos del clima...
        </div>
    `;
}

// Mostrar error
function mostrarError(mensaje) {
    document.getElementById("resultado").innerHTML = `<div class="error">❌ ${mensaje}</div>`;
}

// Permitir buscar con Enter
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("ciudadInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            buscarClima();
        }
    });
    
    obtenerUbicacionActual();
});
</script>

</body>
</html>
